name: E2E

on:
  push:
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GO_VERSION }}-

      - uses: loft-sh/setup-vind@v1
        with:
          name: meshless-a
          version: v0.31.0

      - uses: loft-sh/setup-vind@v1
        with:
          name: meshless-b
          version: v0.31.0

      - uses: loft-sh/setup-vind@v1
        with:
          name: meshless-c
          version: v0.31.0

      - name: Run e2e tests
        run: go test -mod=vendor -tags e2e -v -count=1 -timeout 30m ./test/e2e/
        env:
          MESHLESS_CLUSTER_NAMES: "meshless-a,meshless-b,meshless-c"
