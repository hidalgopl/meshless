name: E2E

on:
  push:
    branches: [main]

env:
  GO_VERSION: "1.25"
  VCLUSTER_VERSION: "v0.33.1"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GO_VERSION }}-

      - name: Install vcluster
        run: |
          curl -L -o /usr/local/bin/vcluster \
            "https://github.com/loft-sh/vcluster/releases/download/${VCLUSTER_VERSION}/vcluster-linux-amd64"
          chmod +x /usr/local/bin/vcluster
          vcluster version
          vcluster use driver docker

      - name: Load kernel modules and write vcluster values
        run: |
          sudo modprobe bridge || true
          sudo modprobe br_netfilter || true
          docker network create meshless-e2e || true
          cat > /tmp/vcluster-values.yaml <<'EOF'
          experimental:
            docker:
              # Privileged mode + host /lib/modules mount required for
              # bridge and br_netfilter kernel modules used by the join-node.
              args:
                - "--privileged"
              volumes:
                - "/lib/modules:/lib/modules:ro"
              # All clusters must be on the same Docker network for
              # cross-cluster LoadBalancer IP routing.
              network: meshless-e2e
              # Disable registry proxy to reduce memory.
              registryProxy:
                enabled: false
          EOF

      - name: Warm up vcluster (D-Bus race workaround)
        run: |
          echo "Creating warm-up cluster to initialize D-Bus..."
          vcluster create _warmup --driver docker --connect=false -f /tmp/vcluster-values.yaml || true

          CONTAINER=$(docker ps -q --filter "name=vcluster" --filter "status=running" 2>/dev/null | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "No running container found, D-Bus may be ready already"
            vcluster delete _warmup --driver docker --ignore-not-found || true
            exit 0
          fi

          echo "Container $CONTAINER found, waiting for D-Bus socket..."
          for i in $(seq 1 120); do
            if docker exec "$CONTAINER" test -e /run/dbus/system_bus_socket 2>/dev/null; then
              echo "D-Bus socket ready after ${i}s"
              break
            fi
            sleep 0.5
          done

          echo "Re-running install-standalone.sh..."
          docker exec "$CONTAINER" /install-standalone.sh --skip-download --skip-wait || true

          vcluster delete _warmup --driver docker --ignore-not-found || true
          echo "Warm-up complete"

      - name: Create meshless-a
        run: vcluster create meshless-a --driver docker --connect=false -f /tmp/vcluster-values.yaml

      - name: Create meshless-b
        run: vcluster create meshless-b --driver docker --connect=false -f /tmp/vcluster-values.yaml

      - name: Create meshless-c
        run: vcluster create meshless-c --driver docker --connect=false -f /tmp/vcluster-values.yaml

      - name: Run e2e tests
        run: go test -mod=vendor -tags e2e -v -count=1 -timeout 30m ./test/e2e/
        env:
          MESHLESS_CLUSTER_NAMES: "meshless-a,meshless-b,meshless-c"
          MESHLESS_PROJECT_ROOT: "${{ github.workspace }}"

      - if: always()
        name: Cleanup clusters
        run: |
          vcluster delete meshless-a --driver docker --ignore-not-found || true
          vcluster delete meshless-b --driver docker --ignore-not-found || true
          vcluster delete meshless-c --driver docker --ignore-not-found || true
          docker network rm meshless-e2e || true
